<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ArchiveFlow</title>
    <style>
      /* Static splash — visible instantly before JS loads */
      body { margin: 0; background: #000; }
      #static-splash {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-family: 'Cascadia Code', 'Source Code Pro', ui-monospace, monospace;
      }
      #static-splash .logo {
        font-size: clamp(1.8rem, 5vw, 2.8rem);
        font-weight: 900;
        letter-spacing: 0.25em;
        color: #00fff7;
        text-shadow: 0 0 20px rgba(0,255,247,0.5);
      }
      #static-splash .sub {
        margin-top: 1.5rem;
        font-size: 0.7rem;
        color: #00fff7;
        opacity: 0.4;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      /* Blinking cursor after "BOOT" */
      #static-splash .blink {
        animation: s-blink 0.7s step-end infinite;
      }
      @keyframes s-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      /* Hide splash once React takes over — JS adds this class */
      #static-splash.hidden { display: none; }
    </style>
  </head>
  <body>
    <div id="static-splash">
      <div class="logo">ARCHIVEFLOW</div>
      <div class="sub">SYS_BOOT<span class="blink">_</span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
